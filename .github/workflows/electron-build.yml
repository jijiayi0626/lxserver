name: Build Electron Desktop App

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*-desktop'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          # 注意：Ubuntu 24.04 (Noble) 中 libasound2 已更名为 libasound2t64，移除已废弃的 libgconf-2-4
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libasound2t64

      - name: Install dependencies
        run: npm ci

      # ── 5. 编译原生模块 (music-tag-native 等) ────────────────────────────────
      - name: Rebuild native modules
        run: npx @electron/rebuild --version $(node -e "console.log(require('electron/package.json').version)")
        env:
          npm_config_build_from_source: true

      - name: Build JS source
        run: npm run electron:build

      - name: Package Electron app
        run: npx electron-builder --${{ matrix.platform }} --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_BUILDER_BINARIES_MIRROR: https://npmmirror.com/mirrors/electron-builder-binaries/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lxserver-desktop-${{ matrix.platform }}
          path: |
            dist-electron/*.exe
            dist-electron/*.dmg
            dist-electron/*.AppImage
            dist-electron/*.deb
            dist-electron/*.zip
          if-no-files-found: warn
          retention-days: 30
